<body>

            6: 6, 7: 7, 8: 8, 9: 9, 10: 10,
            11: 10, 12: 10, 13: 10
        };

        let sum = 0;
        let sumBoks = document.getElementById("sum");


        let hitElm = document.getElementById("Hit")
        let start = document.getElementById("velg")
        let standElm = document.getElementById("stand")
        let spill = document.getElementById("spill")
        let kortposisjon = 1000
        let kortposisjon2 = 300
        let sumDeal = 0
        let sum2 = 0;
        let sumBoks2 = document.getElementById("sum2")
        let bilde = document.createElement("img")
        let minus = document.getElementById("minus")
        let pluss = document.getElementById("pluss")
        let plass = document.getElementById(" plasser")
        let bet = document.getElementById("bet")
        let betElm = 0
        let penger = document.getElementById("penger")
        let money = 5000
        penger.innerHTML = money;
        bet.innerHTML = betElm;





        start.addEventListener("click", function () {
            sum = 0
            sum2 = 0
            sumDeal = 0


            hitElm.style.display = "block"
            hitElm.innerHTML = "HIT"
            standElm.style.display = "block"
            standElm.innerHTML = "STAND"
            sumBoks.style.display = "none"
            sumBoks2.style.display = 'none'
            start.style.display = "none"




            sum += kortVerdier[tilfTall];
            sumBoks.innerHTML = sum;

            sum2 += kortVerdier[tilfTall];
            sumBoks2.innerHTML = sum2;

        });




        let haveDealtCard = false


        hitElm.addEventListener("click", function () {
            const tilfTall = Math.floor(Math.random() * 13) + 1
            const suits = ["spades", "hearts", "clubs", "diamonds"]
            let i = Math.floor(Math.random() * suits.length);
            const suit = suits[i] // i er en tilfeldig indeks
            bilde = document.createElement("img")
            bilde.src = "kortstokk-kopi 2/" + tilfTall + "_of_" + suit + ".png"
            bilde.style.position = "absolute";
            bilde.style.left = kortposisjon + 'px';
            bilde.style.top = "500px";
            document.body.appendChild(bilde)
            bilde.style.display = "block"

            kortposisjon += 25

            sumBoks.style.display = "block"





            if (haveDealtCard == false) {
                dealerCard(true)
                haveDealtCard = true
            }


            sum += kortVerdier[tilfTall];
            sumBoks.innerHTML = sum;

            if (sum > 21) {
                sumBoks.innerHTML = sum + " - BUST!";
                spill.style.display = 'block'
                spill.innerHTML = 'SPILL IGJEN'

            }

            if (sum == 21) {
                sumBoks.innerHTML = "BLACKJACK"
                spill.style.display = 'block'
                spill.innerHTML = 'SPILL IGJEN'


            }



        })

        standElm.addEventListener("click", function () {
            dealerCard()
            hitElm.style.display = "none"

            setTimeout(function () {
                if (sumDeal > 21) {
                    standElm.innerHTML = "Dealer bust! Du vinner!";
                    spill.style.display = 'block'
                    spill.innerHTML = 'SPILL IGJEN'
                } else if (sumDeal > sum) {
                    standElm.innerHTML = "Du tapte";
                    spill.style.display = 'block'
                    spill.innerHTML = 'SPILL IGJEN'
                } else if (sumDeal < sum) {

                    spill.style.display = 'block'
                    spill.innerHTML = 'SPILL IGJEN'
                } else {
                    standElm.innerHTML = "du tapte";
                    spill.style.display = 'block'
                    spill.innerHTML = 'SPILL IGJEN'
                }
            }, 1500);

        });




        function dealerCard(oneCardOnly = false) {
            if (sumDeal < 17 && sum2 < sum) {
                const tilfTall = Math.floor(Math.random() * 13) + 1
                const suits = ["spades", "hearts", "clubs", "diamonds"]
                let i = Math.floor(Math.random() * suits.length);
                const suit = suits[i] // i er en tilfeldig indeks
                bilde = document.createElement("img")
                bilde.src = "kortstokk-kopi 2/" + tilfTall + "_of_" + suit + ".png"
                bilde.style.position = "absolute"
                bilde.style.top = "500px"
                bilde.style.left = kortposisjon2 + 'px'
                document.body.appendChild(bilde)
                bilde.style.display = "block"


                sumBoks2.style.display = 'block'


                kortposisjon2 += 25
                sumDeal += kortVerdier[tilfTall]

                sum2 += kortVerdier[tilfTall];
                sumBoks2.innerHTML = sum2;



                if (oneCardOnly == false) {
                    setTimeout(dealerCard, 500)
                }

            }





        }
        spill.addEventListener("click", function () {
            document.querySelectorAll("img").forEach(function (kort) {
                kort.style.display = "none";
            });
            spill.style.display = "none";
            hitElm.innerHTML = ' HIT'
            start.style.display = 'block'
            standElm.style.display = 'none'
            hitElm.style.display = 'none'
            sumBoks.style.display = 'none'
            sumBoks2.style.display = 'none'

        });

        minus.addEventListener("click", function () {
            money += 150
            betElm -= 150
            bet.innerHTML = betElm
            penger.innerHTML = money
            if (betElm < 0) {
                minus.style.display = 'none'
            }
            if (betElm > ) {

            }


        });

        pluss.addEventListener("click", function () {
